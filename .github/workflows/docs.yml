name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/configure-pages@v6
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
      - name: Build Sphinx docs
        run: make -C docs current-docs
      - name: Verify Pages artifact
        run: |
          test -f docs/_build/current/.nojekyll
          test -f docs/_build/current/_static/styles/sphinx-book-theme.css
          test ! -f docs/_build/current/source/cortex.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/current
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
